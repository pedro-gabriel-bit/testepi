<!DOCTYPE html>

<html lang="pt-br">

<head>

  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Cadastro - Titan Fit</title>

  <link rel="stylesheet" href="css/cadastro.css" />

</head>

<body>



  <!-- Overlay cobrindo a tela inteira (visível por padrão nesta página) -->

  <div id="cadastro-overlay" class="overlay" aria-hidden="false">

    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="cadastro-title">

      <button class="fechar" aria-label="Fechar" id="btn-close">✖</button>



      <figure>

        <img src="fotos/logo.png" alt="Logo Titan Fit">

      </figure>



      <h1 id="cadastro-title">Cadastro</h1>



      <form id="cadastro-form" action="#" method="post" novalidate>

        <label for="nome">Nome completo</label>

        <input type="text" id="nome" name="nome" placeholder="Fulano da Silva" required>



        <label for="email">E-mail</label>

        <input type="email" id="email" name="email" placeholder="fulano@gmail.com" required>



        <label for="usuario">Nome do usuário</label>

        <input type="text" id="usuario" name="usuario" placeholder="fulano123" required>



        <label for="senha">Criar senha</label>

        <div class="input-group">

          <input type="password" id="senha" name="senha" placeholder="***********" required>

          <button type="button" class="password-toggle" data-target="senha" aria-label="Mostrar senha"></button>

        </div>



        <label for="confirmar-senha">Confirmar senha</label>

        <div class="input-group">

          <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="***********" required>

          <button type="button" class="password-toggle" data-target="confirmar-senha" aria-label="Mostrar confirmar senha"></button>

        </div>



        <div class="erro-senha" id="erro-senha" role="alert" aria-live="assertive" style="display:none;">

          As senhas não coincidem.

        </div>



        <!-- Ajuste 2: botão com id para controlar via JS e estrutura do loader -->

        <button type="submit" id="cadastro-submit">

          <span class="btn-loader" aria-hidden="true"></span>

          <span class="btn-text">Cadastrar</span>

        </button>

      </form>



      <a href="sobre-nos.html" class="voltar">Voltar para Login</a>

    </div>

  </div>



  <!-- Ajuste 3: incluir o script de comportamento -->

  <script src="js/cadastro.js"></script>

</body>

</html>
