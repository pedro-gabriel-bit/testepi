<!-- Modal de Login -->
<div id="login-overlay" class="login-overlay hidden" aria-hidden="true">

  <div class="login-modal" role="dialog" aria-modal="true" aria-labelledby="login-title">

    <button type="button" class="fechar" id="login-close" aria-label="Fechar">✖</button>

    <!-- LOGO NO TOPO -->
    <figure class="logo-topo">
      <img src="img/logo2.png" alt="Titan Fit">
    </figure>

    <h1 id="login-title">Entrar</h1>
    <p class="subtitle">Faça login para acessar sua conta</p>

    <form id="login-form" action="#" method="post" novalidate>

      <label for="login-email">E-mail</label>
      <input id="login-email" name="email" type="email" placeholder="seu@exemplo.com" required>

      <label for="login-password">Senha</label>
      <input id="login-password" name="password" type="password" placeholder="********" required>

      <button type="submit" id="login-submit" class="btn-continuar">
        entrar
      </button>

    </form>

    <span class="divisor">ou</span>

    <button type="button" class="btn-social">
      <img src="img/Logo-google-icon.png" alt="Google" class="social-icon">
      <span>continuar com Google</span>
    </button>

    <button type="button" class="btn-social">
      <img src="img/apple-logo-icon.png" alt="Apple" class="social-icon">
      <span>continuar com Apple</span>
    </button>

    <div class="cadastro-texto">
      Não tem conta? <a href="cadastro.html">Criar agora</a>
    </div>

  </div>
</div>
